<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  
  <!--
  1. Inline CSS - Direto no HTML, ou na tag
  <h1 style="color: red;">Iniciando meu projeto</h1>
  <h1 style="font-size: 20px">Iniciando meu projeto</h1>

  2. CSS Interno - Direto no seu html na tag Style
  <style>
    h1{
      color: green;
    }
  </style>

  3. CSS Externo - Criar um arquivo externo (melhor prática)
  <link rel="stylesheet" href="style.css">
  -->


  <h1 style="font-size: 20px">Iniciando meu projeto</h1>

</body>
</html>
