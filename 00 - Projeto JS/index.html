<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Projeto Sanquim</title>
</head>

<body>

  <!-- PÁGINA DE LOGIN  -->
  <section id="tela-login">
    <h1>Bem Vindo ao Sanquim!</h1>
    <p>Faça seu login para continuar</p>
    <div class="formulario">
      <form action="" id="login-form">
        <div class="emailLogin">
          <label for="">Digite seu email:</label>
          <input type="text" id="email" placeholder="Ex: joao.silva@sanquim.com">
        </div>
        <div class="senhaLogin">
          <label for="">Digite sua senha:</label>
          <input type="password" id="senha" placeholder="*********">
        </div>
        <div class="botao">
          <input type="submit" value="Entrar">
        </div>
        <div class="esqueceuSenha">
          <a href="#">Esqueceu a senha?</a>
        </div>
      </form>
    </div>
  </section>


  <!-- DASHBOARD  -->

  <section id="dashboard">

    <h1>Painels do Coordenador</h1>

  </section>

  <script src="./script.js"></script>

</body>

</html>
