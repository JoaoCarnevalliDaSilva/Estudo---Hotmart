<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./6 - style.css">
  <title>Projeto Final Arrays</title>
</head>
<body>

  <header>
    <h1>Lista de Pendências</h1>
    <div class="nav-menu">
      <ul>
        <li>Home</li>
        <li>Sobre a Viagem</li>
        <li>Links úteis</li>
      </ul>
    </div>
  </header>

  <main>
    <div class="adicionar">
      <h3>Adicione novas tarefas!</h3>
      <form action="" onsubmit="adicionar(event)">
        <label for="">Digite uma nova tarefa:</label><br>
        <input type="text" id="input-adicionar" placeholder="Ex: Visto"><br><br>
        <div class="botao">
          <input type="submit" value="Adicionar">
        </div>
      </form>
    </div>
    <div class="concluir">
      <h3>Registre sua tarefa finalizada!</h3>
      <form action="" onsubmit="finalizar(event)">
        <label for="">Digite a tarefa finalizada:</label><br>
        <input type="text" id="input-finalizar" placeholder="Ex: Visto"><br><br>
        <div class="botao">
          <input type="submit" value="Registrar">
        </div>
      </form>
    </div>
    <div class="remover">
      <h3>Apague uma tarefa.</h3>
      <form action="" onsubmit="deletar(event)">
        <label for="">Digite a tarefa a ser excluida:</label><br>
        <input type="text" id="input-deletar" placeholder="Ex: Visto"><br><br>
        <div class="botao">
          <input type="submit" value="Apagar">
        </div> 
      </form>
    </div>
  </main>

  <div class="mensagem">
    <h4 id="resultado"></h4>
    <h4 id="resultado-erro"></h4>
  </div>

  <section class="listagem">
    <div id="lista-completa" class="list"></div>
    <div id="contagem" class="cont"></div>
  </section>


  <footer>
    <p>Desenvolvido por João - 2026</p>
  </footer>

  <script src="./6 - script.js"></script>
  
</body>
</html>
